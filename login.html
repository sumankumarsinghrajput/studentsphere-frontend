<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Student Sphere</title>
  <link rel="icon" type="image/x-icon" href="css/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <img src="css/logo.png" alt="Student Sphere Logo" class="nav-brand-icon">
    <span class="nav-brand-name">Student <em>Sphere</em></span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about-dev.html">About</a>
  </div>
  <div class="nav-right"></div>
  <button class="hamburger" id="ham-btn"><span></span><span></span><span></span></button>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <a href="index.html">Home</a>
  <a href="about-dev.html">About</a>
</div>

<div class="pt-nav">
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="css/logo.png" alt="Student Sphere Logo" class="auth-logo-icon">
        <span class="auth-logo-name">Student <em>Sphere</em></span>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>

      <div id="auth-alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="l-email">Email Address</label>
          <input type="email" id="l-email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="l-pass">Password</label>
          <div style="position:relative">
            <input type="password" id="l-pass" class="form-control" placeholder="Enter your password" required style="padding-right:2.5rem">
            <button type="button" onclick="togglePassVis('l-pass',this)"
              style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">Sign In</button>
      </form>

      <div class="auth-switch" style="margin-top:1.25rem;text-align:center;font-size:.85rem;color:var(--muted)">
        Your account is created by your administrator.<br>
        Contact your admin if you need access.
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 <span>Student Sphere</span></p>
  </footer>
</div>

<div class="egg-overlay" id="egg-overlay">
  <div class="egg-box">
    <img src="css/logo.png" alt="Student Sphere Logo" class="egg-icon">
    <h2>Student <span>Sphere</span></h2>
    <p>Designed &amp; Developed by</p>
    <div class="egg-dev">Suman Kumar Singh</div>
    <button class="btn btn-primary" id="egg-close">Close</button>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  function togglePassVis(id, btn) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? '👁' : '🙈';
  }
  document.addEventListener('DOMContentLoaded', function() {
    initLogin();
    initHam();
    initEasterEgg();
  });
</script>
</body>
</html>
