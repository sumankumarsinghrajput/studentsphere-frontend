<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Student Sphere</title>
  <link rel="icon" type="image/x-icon" href="css/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">
    <img src="css/logo.png" alt="Student Sphere Logo" class="nav-brand-icon">
    <span class="nav-brand-name">Student <em>Sphere</em></span>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about-dev.html">About</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="btn btn-outline btn-sm">Sign In</a>
  </div>
  <button class="hamburger" id="ham-btn"><span></span><span></span><span></span></button>
</nav>
<div class="nav-drawer" id="nav-drawer">
  <a href="index.html">Home</a>
  <a href="about-dev.html">About</a>
  <a href="login.html">Sign In</a>
</div>

<div class="pt-nav">
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <img src="css/logo.png" alt="Student Sphere Logo" class="auth-logo-icon">
        <span class="auth-logo-name">Student <em>Sphere</em></span>
      </div>

      <h2>Create account</h2>
      <p class="sub">Join as a student or faculty member</p>

      <div id="auth-alert"></div>

      <form id="reg-form">
        <div class="form-group">
          <label for="r-name">Full Name</label>
          <input type="text" id="r-name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label for="r-email">Email Address</label>
          <input type="email" id="r-email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="r-role">I am a</label>
          <select id="r-role" class="form-control">
            <option value="student">Student</option>
            <option value="faculty">Faculty</option>
          </select>
        </div>
        <!-- Semester — shown for both students and faculty -->
        <div class="form-group" id="sem-group">
          <label for="r-semester">Class / Semester</label>
          <select id="r-semester" class="form-control">
            <option value="">— Select your semester —</option>
            <option value="Semester 1">Semester 1</option>
            <option value="Semester 2">Semester 2</option>
            <option value="Semester 3">Semester 3</option>
            <option value="Semester 4">Semester 4</option>
            <option value="Semester 5">Semester 5</option>
            <option value="Semester 6">Semester 6</option>
            <option value="Semester 7">Semester 7</option>
            <option value="Semester 8">Semester 8</option>
          </select>
        </div>
        <div class="form-group">
          <label for="r-pass">Password</label>
          <input type="password" id="r-pass" class="form-control" placeholder="Minimum 6 characters" required>
        </div>
        <div class="form-group">
          <label for="r-conf">Confirm Password</label>
          <input type="password" id="r-conf" class="form-control" placeholder="Re-enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:.25rem">Create Account →</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2024 <span>Student Sphere</span></p>
  </footer>
</div>

<div class="egg-overlay" id="egg-overlay">
  <div class="egg-box">
    <img src="css/logo.png" alt="Student Sphere Logo" class="egg-icon">
    <h2>Student <span>Sphere</span></h2>
    <p>Designed &amp; Developed by</p>
    <div class="egg-dev">Suman Kumar Singh</div>
    <button class="btn btn-primary" id="egg-close">Close</button>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    initRegister();
    initHam();
    initEasterEgg();
  });
</script>
</body>
</html>
